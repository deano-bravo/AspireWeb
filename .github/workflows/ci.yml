name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-fast-tests:
    name: Build + fast tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      # Setup + NuGet cache + restore + build (-warnaserror) — see .github/actions/dotnet-setup.
      - uses: ./.github/actions/dotnet-setup

      # Docker-free tier: excludes the AppHost-backed integration collection.
      # --minimum-expected-tests guards against a trait/filter typo silently selecting nothing.
      - name: Fast tests
        run: >
          dotnet test --solution AspireWeb.slnx -c Release --no-build
          --results-directory ./TestResults --minimum-expected-tests 10
          -- --filter-not-trait Category=Integration --report-xunit-trx
          --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fast-test-results
          path: TestResults

  integration-tests:
    name: Integration tests (AppHost + Docker)
    needs: build-and-fast-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # Rebuilds on this fresh runner: passing .NET bin/obj between jobs is fragile, so the
      # shared action restores + builds again. Revisit if build time becomes a bottleneck.
      - uses: ./.github/actions/dotnet-setup

      # Boots the full AppHost per collection fixture: Docker is preinstalled on
      # ubuntu-latest; DCP + dashboard binaries ship via the Aspire NuGet packages.
      # The fixture's 3-minute startup budget covers the cold postgres/pgweb image pulls.
      - name: Integration tests
        run: >
          dotnet test --solution AspireWeb.slnx -c Release --no-build
          --results-directory ./TestResults --minimum-expected-tests 8
          -- --filter-trait Category=Integration --report-xunit-trx

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: TestResults
